name: brotherhood
description: A daily discipline tracker for four friends.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3

  # Photos
  image_picker: ^1.1.2

  # Local storage
  shared_preferences: ^2.3.1

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Background tasks
  workmanager: ^0.7.0

  # State management
  provider: ^6.1.2

  # UI & Calendar
  table_calendar: ^3.1.2
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  # flutter_test pins vector_math to 2.1.4, but Flutter 3.29.3's AOT compiler
  # needs 2.2.0 for Matrix4 in rendering. Pin exactly to the version the
  # original pub.lock had (sdk: ^3.1.0 → compatible with Dart 3.7.2).
  vector_math: 2.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/icon.png
  
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0F0F1A"
  adaptive_icon_foreground: "assets/icon/icon.png"
