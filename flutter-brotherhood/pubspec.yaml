name: brotherhood
description: A daily discipline tracker for four friends.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.1

  # Local storage
  shared_preferences: ^2.3.1

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Background tasks
  workmanager: ^0.5.2

  # State management
  provider: ^6.1.2

  # UI & Calendar
  table_calendar: ^3.1.2
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
